<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFF5F5; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        [x-cloak] { display: none !important; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body x-data="birthdayApp()" class="min-h-screen flex flex-col overflow-x-hidden">

    <!-- Confetti Canvas -->
    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50" x-show="showConfetti"></canvas>

    <!-- Background Icons -->
    <div class="fixed inset-0 pointer-events-none opacity-[0.03] z-0 hidden sm:block">
        <i data-lucide="star" class="absolute top-10 left-10 w-24 h-24"></i>
        <i data-lucide="heart" class="absolute bottom-20 right-20 w-32 h-32"></i>
        <i data-lucide="cake" class="absolute top-1/2 left-1/4 w-20 h-20"></i>
        <i data-lucide="gift" class="absolute top-1/3 right-1/4 w-28 h-28"></i>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6 relative z-10">
        
        <!-- Page 0: Hero -->
        <template x-if="currentPage === 0">
            <div class="text-center w-full max-w-4xl" x-transition>
                <div class="inline-block mb-6 animate-float">
                    <i data-lucide="cake" class="w-20 h-20 text-pink-500"></i>
                </div>
                <h1 class="text-5xl md:text-8xl font-black tracking-tighter text-slate-900 mb-4 leading-tight">
                    HAPPY <span class="text-pink-500">BIRTHDAY</span>
                </h1>
                <p class="text-lg md:text-2xl font-medium text-slate-600 max-w-2xl mx-auto leading-relaxed mb-12">
                    To the most special person in my life. Today is all about celebrating YOU and the magic you bring!
                </p>
                <button @click="nextPage()" class="mx-auto bg-pink-500 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-600 shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                    Start the Celebration <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>
        </template>

        <!-- Page 1: Gift -->
        <template x-if="currentPage === 1">
            <div class="text-center w-full max-w-4xl" x-transition>
                <h2 class="text-3xl md:text-4xl font-bold mb-12">I have a little something for you...</h2>
                <div class="relative flex justify-center items-center min-h-[300px] mb-12">
                    <div x-show="!isOpened" @click="openGift()" class="cursor-pointer group relative">
                        <div class="absolute -inset-4 bg-pink-500/20 rounded-full blur-xl group-hover:bg-pink-500/30 transition-all"></div>
                        <i data-lucide="gift" class="w-32 h-32 text-pink-500 relative z-10"></i>
                        <p class="mt-4 font-bold text-pink-600 uppercase tracking-widest text-sm">Click to open</p>
                    </div>
                    <div x-show="isOpened" x-cloak class="bg-white p-10 rounded-[2.5rem] border-2 border-pink-100 shadow-2xl max-w-sm mx-auto">
                        <i data-lucide="sparkles" class="w-10 h-10 text-yellow-500 mx-auto mb-6"></i>
                        <h3 class="text-2xl md:text-3xl font-bold text-pink-700 mb-4">A Special Connection</h3>
                        <p class="text-slate-700 text-lg leading-relaxed italic">
                            "The best thing that ever happened to me was finding you. May your year be as beautiful and amazing as your smile!"
                        </p>
                        <div class="mt-8 flex justify-center gap-3">
                            <i data-lucide="heart" class="w-6 h-6 text-pink-400 fill-current"></i>
                            <i data-lucide="heart" class="w-6 h-6 text-pink-400 fill-current"></i>
                            <i data-lucide="heart" class="w-6 h-6 text-pink-400 fill-current"></i>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button @click="prevPage()" class="bg-white text-slate-600 border-2 border-slate-100 px-8 py-4 rounded-full font-bold text-lg hover:bg-slate-50 flex items-center justify-center gap-2 transition-all active:scale-95">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i> Back
                    </button>
                    <button @click="nextPage()" class="bg-pink-500 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-600 flex items-center justify-center gap-2 transition-all active:scale-95">
                        Next Surprise <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </template>

        <!-- Page 2: Memories -->
        <template x-if="currentPage === 2">
            <div class="w-full max-w-6xl" x-transition>
                <div class="text-center mb-12">
                    <span class="text-pink-500 font-bold uppercase tracking-widest text-sm">Our Journey</span>
                    <h2 class="text-3xl md:text-5xl font-black mt-2">FAVORITE MEMORIES</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:-translate-y-2 transition-all">
                        <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center mb-6">
                            <i data-lucide="flame" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-3">Hamara Roz Ka Kalesh</h3>
                        <p class="text-slate-600 leading-relaxed">Hamari dosti bina kalesh ke adhuri hai! Wo cute si ladaiyan aur phir maan jaana hi toh sabse pyaara hai.</p>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:-translate-y-2 transition-all">
                        <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-6">
                            <i data-lucide="star" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-3">Waiting to Meet</h3>
                        <p class="text-slate-600 leading-relaxed">Bhale hi hum kabhi mile nahi, par tumhare saath bitaya har pal mere liye bahut special hai. Us din ka intezaar hai jab hum pehli baar milenge.</p>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:-translate-y-2 transition-all">
                        <div class="w-12 h-12 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mb-6">
                            <i data-lucide="heart" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-3">Being My Strength</h3>
                        <p class="text-slate-600 leading-relaxed">Tum hamesha mere saath khadi rehti ho, chahe kuch bhi ho. Mere liye tumse zyada special koi nahi.</p>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button @click="prevPage()" class="bg-white text-slate-600 border-2 border-slate-100 px-8 py-4 rounded-full font-bold text-lg hover:bg-slate-50 flex items-center justify-center gap-2 transition-all active:scale-95">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i> Back
                    </button>
                    <button @click="nextPage()" class="bg-pink-500 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-600 flex items-center justify-center gap-2 transition-all active:scale-95">
                        Keep Going <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </template>

        <!-- Page 3: Virtual Wishes -->
        <template x-if="currentPage === 3">
            <div class="w-full max-w-4xl" x-transition>
                <div class="text-center mb-12">
                    <span class="text-pink-500 font-bold uppercase tracking-widest text-sm">Special For You</span>
                    <h2 class="text-3xl md:text-5xl font-black mt-2 uppercase">VIRTUAL WISHES</h2>
                    <p class="text-slate-600 mt-4">Click on each card to reveal a special wish I have for you! ✨</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <template x-for="wish in sweetWishes" :key="wish.id">
                        <div 
                            @click="toggleWish(wish.id)"
                            class="cursor-pointer p-8 rounded-[2rem] border-2 transition-all duration-500 flex flex-col items-center text-center"
                            :class="revealedWishes.includes(wish.id) ? 'bg-white border-pink-200 shadow-xl scale-105' : 'bg-pink-50 border-transparent hover:border-pink-100 shadow-sm'"
                        >
                            <div 
                                class="w-16 h-16 rounded-2xl flex items-center justify-center mb-6 transition-colors duration-500"
                                :class="revealedWishes.includes(wish.id) ? 'bg-pink-500 text-white' : 'bg-white text-pink-500'"
                            >
                                <template x-if="revealedWishes.includes(wish.id)">
                                    <i :data-lucide="wish.icon" class="w-8 h-8"></i>
                                </template>
                                <template x-if="!revealedWishes.includes(wish.id)">
                                    <i data-lucide="gift" class="w-8 h-8"></i>
                                </template>
                            </div>
                            
                            <h3 class="text-xl font-bold mb-4" x-text="revealedWishes.includes(wish.id) ? wish.title : 'Tap to reveal'"></h3>
                            
                            <div x-show="revealedWishes.includes(wish.id)" x-transition class="text-slate-600 italic leading-relaxed" x-text="wish.message"></div>
                        </div>
                    </template>
                </div>

                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button @click="prevPage()" class="bg-white text-slate-600 border-2 border-slate-100 px-8 py-4 rounded-full font-bold text-lg hover:bg-slate-50 flex items-center justify-center gap-2 transition-all active:scale-95">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i> Back
                    </button>
                    <button @click="nextPage()" class="bg-pink-50 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-600 flex items-center justify-center gap-2 transition-all active:scale-95">
                        One Last Thing <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </template>

        <!-- Page 4: Final Surprise -->
        <template x-if="currentPage === 4">
            <div class="text-center max-w-2xl w-full" x-transition>
                <div x-show="!showFinalSurprise" class="flex flex-col items-center">
                    <div class="mb-8 animate-float">
                        <i data-lucide="gift" class="w-24 h-24 text-pink-500"></i>
                    </div>
                    <h2 class="text-3xl md:text-5xl font-black mb-6">READY FOR THE LAST SURPRISE?</h2>
                    <p class="text-slate-600 mb-10 text-lg">I have one more thing to tell you...</p>
                    <button @click="revealFinal()" class="bg-pink-500 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-pink-600 shadow-lg transition-all active:scale-95">
                        Open Final Surprise 🎁
                    </button>
                </div>
                <div x-show="showFinalSurprise" x-cloak class="bg-white p-12 rounded-[3rem] shadow-2xl border-4 border-pink-200 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400"></div>
                    <i data-lucide="heart" class="w-16 h-16 text-pink-500 fill-current mx-auto mb-6"></i>
                    <h2 class="text-3xl md:text-5xl font-black mb-6 text-slate-800 uppercase">YOU ARE MY FAVORITE!</h2>
                    <div class="bg-pink-50 p-6 rounded-2xl mb-8 border border-pink-100">
                        <p class="text-lg md:text-2xl text-pink-700 font-bold italic leading-relaxed">
                            "In a world full of temporary things, you are my favorite constant. Happy Birthday to the one who makes my heart skip a beat!"
                        </p>
                    </div>
                    <p class="text-slate-600 text-xl leading-relaxed mb-10">
                        I'm so lucky to have you in my life. Thank you for being my constant support, my laughter partner, and my everything. I can't wait to make more beautiful memories with you.
                    </p>
                    <button @click="resetApp()" class="bg-white text-slate-600 border-2 border-slate-100 px-8 py-4 rounded-full font-bold text-lg hover:bg-slate-50 flex items-center justify-center gap-2 transition-all active:scale-95">
                        Start Over <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="mt-12 text-xs font-bold text-slate-400 uppercase tracking-[0.4em]">Made with love for my favorite person &bull; 2026</p>
            </div>
        </template>
    </main>

    <!-- Progress Dots -->
    <div class="pb-8 flex justify-center gap-2 relative z-10">
        <template x-for="i in [0,1,2,3,4]">
            <div class="h-1.5 rounded-full transition-all duration-500" :class="currentPage === i ? 'w-8 bg-pink-500' : 'w-2 bg-slate-200'"></div>
        </template>
    </div>

    <script>
        function birthdayApp() {
            return {
                currentPage: 0,
                isOpened: false,
                revealedWishes: [],
                showConfetti: false,
                showFinalSurprise: false,
                sweetWishes: [
                    {
                        id: 1,
                        title: "My First Wish",
                        message: "May your life be filled with as much happiness as you've brought into mine since we started talking. ✨",
                        icon: "star"
                    },
                    {
                        id: 2,
                        title: "My Second Wish",
                        message: "I wish for the day we finally meet to be the most magical day ever. I can't wait to see you for real! 🤝",
                        icon: "heart"
                    },
                    {
                        id: 3,
                        title: "My Third Wish",
                        message: "May all your dreams come true, and I hope I can be a part of making them happen. Happy Birthday! 🎂",
                        icon: "sparkles"
                    }
                ],
                nextPage() {
                    this.currentPage = Math.min(this.currentPage + 1, 4);
                    this.$nextTick(() => lucide.createIcons());
                },
                prevPage() {
                    this.currentPage = Math.max(this.currentPage - 1, 0);
                    this.$nextTick(() => lucide.createIcons());
                },
                openGift() {
                    this.isOpened = true;
                    this.triggerConfetti();
                },
                toggleWish(id) {
                    if (this.revealedWishes.includes(id)) {
                        this.revealedWishes = this.revealedWishes.filter(w => w !== id);
                    } else {
                        this.revealedWishes.push(id);
                    }
                    this.$nextTick(() => lucide.createIcons());
                },
                revealFinal() {
                    this.showFinalSurprise = true;
                    this.triggerConfetti();
                    this.$nextTick(() => lucide.createIcons());
                },
                resetApp() {
                    this.currentPage = 0;
                    this.isOpened = false;
                    this.revealedWishes = [];
                    this.showFinalSurprise = false;
                    this.$nextTick(() => lucide.createIcons());
                },
                triggerConfetti() {
                    this.showConfetti = true;
                    const canvas = document.getElementById('confetti');
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    
                    let particles = [];
                    for(let i=0; i<100; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height - canvas.height,
                            size: Math.random() * 10 + 5,
                            color: ['#FF69B4', '#FFD700', '#00CED1', '#FF4500', '#9370DB'][Math.floor(Math.random()*5)],
                            speed: Math.random() * 3 + 2
                        });
                    }

                    const animate = () => {
                        if (!this.showConfetti) return;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        particles.forEach(p => {
                            p.y += p.speed;
                            if (p.y > canvas.height) p.y = -20;
                            ctx.fillStyle = p.color;
                            ctx.fillRect(p.x, p.y, p.size, p.size);
                        });
                        requestAnimationFrame(animate);
                    };
                    animate();
                    setTimeout(() => this.showConfetti = false, 10000);
                },
                init() {
                    lucide.createIcons();
                }
            }
        }
    </script>
</body>
</html>
